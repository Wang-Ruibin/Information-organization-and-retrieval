<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物流服务分面导航系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>物流服务分面导航系统</h1>
        <p>请选择以下一个或多个条件来筛选物流服务</p>
    </header>

    <main>
        <aside id="facets-container" class="facets-container">
            <!-- 分面筛选器将由 JavaScript 动态生成 -->
            <h2>筛选条件</h2>
            <div id="facets-list"></div>
        </aside>

        <section id="results-container" class="results-container">
            <h2>服务列表</h2>
            <div id="services-list" class="services-list">
                <!-- 服务列表将由 JavaScript 动态生成 -->
                <p>正在加载服务...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>《信息组织与检索》课程设计</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
